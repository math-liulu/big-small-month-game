        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&amp;display=swap');

        :root {
            --primary-bg: #fef3c7;
            --card-bg: #ffffff;
            --accent-yellow: #f59e0b;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --text-main: #1e293b;
        }

        html {
            font-size: 18px; /* 整体调大基础字号 */
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--primary-bg);
            background-image: radial-gradient(#fcd34d 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border-radius: 1rem;
        }

        .month-display {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b 0%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        .role-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .role-card.active {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-switch {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transition: all 0.2s;
        }

        .btn-switch.active {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            z-index: 100;
        }
    &lt;/style&gt;

    &lt;script&gt;
        const months = [
            { val: 1, type: 'big', name: '一月' },
            { val: 2, type: 'special', name: '二月' },
            { val: 3, type: 'big', name: '三月' },
            { val: 4, type: 'small', name: '四月' },
            { val: 5, type: 'big', name: '五月' },
            { val: 6, type: 'small', name: '六月' },
            { val: 7, type: 'big', name: '七月' },
            { val: 8, type: 'big', name: '八月' },
            { val: 9, type: 'small', name: '九月' },
            { val: 10, type: 'big', name: '十月' },
            { val: 11, type: 'small', name: '十一月' },
            { val: 12, type: 'big', name: '十二月' }
        ];

        let isPlaying = false;
        let gameTimer = null;
        let countdownInterval = null;
        let currentMonth = null;
        let roundCount = 0; // 记录判断次数

        const toggleBtn = document.getElementById('gameToggle');
        const toggleText = document.getElementById('toggleText');
        const toggleIcon = document.getElementById('toggleIcon');
        const monthValue = document.getElementById('monthValue');
        const monthLabel = document.getElementById('monthLabel');
        const feedback = document.getElementById('feedback');
        const timerDisplay = document.getElementById('timer');

        const cards = {
            big: document.getElementById('card-big'),
            small: document.getElementById('card-small'),
            special: document.getElementById('card-special')
        };

        toggleBtn.addEventListener('click', () =&gt; {
            if (!isPlaying) {
                startGame();
            } else {
                stopGame();
            }
        });

        function startGame() {
            isPlaying = true;
            roundCount = 0; // 重置计数
            toggleBtn.classList.add('active');
            toggleText.innerText = '下一轮';
            toggleIcon.innerText = '▶';
            timerDisplay.classList.remove('hidden');
            nextRound();
        }

        function stopGame() {
            isPlaying = false;
            roundCount = 0;
            toggleBtn.classList.remove('active');
            toggleText.innerText = '游戏开始';
            toggleIcon.innerText = '▶';
            timerDisplay.classList.add('hidden');
            clearTimeout(gameTimer);
            clearInterval(countdownInterval);
            resetUI();
        }

        function playTensionSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const rollInterval = 80; // 与滚动速度一致
            
            const playTick = (freq, volume, duration) =&gt; {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(volume, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            };

            let count = 0;
            const maxTicks = 25;
            const timer = setInterval(() =&gt; {
                // 频率随时间轻微上升增加紧张感
                const freq = 150 + (count * 10);
                playTick(freq, 0.1, 0.05);
                count++;
                if (count &gt;= maxTicks) {
                    clearInterval(timer);
                    // 结束时一个清脆的重音
                    playTick(440, 0.2, 0.3);
                }
            }, rollInterval);
        }

        function nextRound() {
            if (!isPlaying) return;
            
            // 检查是否正在进行中（防止重复点击）
            if (toggleBtn.disabled) return;
            toggleBtn.disabled = true;
            toggleBtn.style.opacity = '0.5';

            // 重置UI
            resetUI();
            
            roundCount++;
            
            // 逻辑：第四次必出二月，且增加二月出现的概率
            if (roundCount === 4) {
                currentMonth = months.find(m =&gt; m.val === 2);
            } else {
                // 增加二月出现的概率：将二月在随机池中重复添加
                const weightedMonths = [...months, ...Array(3).fill(months.find(m =&gt; m.val === 2))];
                currentMonth = weightedMonths[Math.floor(Math.random() * weightedMonths.length)];
            }
            
            // 播放紧张感音效
            playTensionSound();

            // 月份滚动效果
            let rollCount = 0;
            const maxRolls = 25; // 增加滚动次数以匹配2秒时长
            const rollInterval = setInterval(() =&gt; {
                const tempMonth = months[Math.floor(Math.random() * months.length)];
                monthValue.innerText = tempMonth.val + '月';
                rollCount++;
                
                if (rollCount &gt;= maxRolls) {
                    clearInterval(rollInterval);
                    // 停在最终月份
                    monthValue.innerText = currentMonth.val + '月';
                    
                    // 停下后的强调动画
                    anime({
                        targets: '#monthValue',
                        scale: [1, 1.3, 1],
                        duration: 400,
                        easing: 'easeOutBack'
                    });

                    monthLabel.innerText = '请判断！';
                    
                    // 启动倒计时
                    startCountdown(3.0);

                    // 3秒后显示答案
                    gameTimer = setTimeout(() =&gt; {
                        showAnswer();
                    }, 3000);
                }
            }, 80); // 滚动速度保持 80ms，25次约等于 2000ms (2秒)

            monthLabel.innerText = '正在抽取...';
        }

        function startCountdown(seconds) {
            let remaining = seconds;
            const span = timerDisplay.querySelector('span');
            span.innerText = remaining.toFixed(1) + 's';
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() =&gt; {
                remaining -= 0.1;
                if (remaining &lt;= 0) {
                    clearInterval(countdownInterval);
                    span.innerText = '0.0s';
                } else {
                    span.innerText = remaining.toFixed(1) + 's';
                }
            }, 100);
        }

        function showAnswer() {
            if (!isPlaying) return;

            // 高亮对应卡片
            const activeCard = cards[currentMonth.type];
            activeCard.classList.add('active', 'pulse');

            // 显示反馈文字
            feedback.style.opacity = '1';
            feedback.style.transform = 'translateY(0)';
            
            let resultText = '';
            let colorClass = '';
            
            if (currentMonth.type === 'big') {
                resultText = '大月 (31天) - 第一大组拍手两下！';
                colorClass = 'text-amber-600';
            } else if (currentMonth.type === 'small') {
                resultText = '小月 (30天) - 第二大组拍桌子两下！';
                colorClass = 'text-blue-600';
            } else {
                resultText = '特殊月 (28/29天) - 第三大组双手摸耳朵！';
                colorClass = 'text-rose-600';
            }

            feedback.innerHTML = `&lt;span class=&quot;${colorClass}&quot;&gt;${resultText}&lt;/span&gt;`;
            monthLabel.innerText = '判断正确了吗？';

            // 恢复按钮点击
            toggleBtn.disabled = false;
            toggleBtn.style.opacity = '1';
            toggleText.innerText = '下一轮';
        }

        function resetUI() {
            Object.values(cards).forEach(card =&gt; card.classList.remove('active', 'pulse'));
            feedback.style.opacity = '0';
            feedback.style.transform = 'translateY(1rem)';
            monthValue.innerText = isPlaying ? '...' : '?';
            monthLabel.innerText = isPlaying ? '准备中...' : '准备好了吗？';
        }

        // 初始动画
        anime({
            targets: '.role-card',
            translateX: [-50, 0],
            opacity: [0, 1],
            delay: anime.stagger(100),
            easing: 'easeOutExpo'
        });
    &lt;/script&gt;

<script>

    function getIsMobile() {
        const width = document.documentElement.clientWidth
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
        return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
        const isMobile = getIsMobile()

        // 判断是否为移动端浏览器
        if (isMobile) {
            // 移动端不跳转
            return
        }
        window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)

            window.frog.add({
                url: '/click/HtmlPage/logo',
                eventId: 42816,
                customExtend: {
                    chat_id: chatId,
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'logo'
            })

            console.log('[埋点] 点击飞象老师 Logo')
        }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)
            window.frog.add({
                url: '/click/HtmlPage/start',
                eventId: 42817,
                customExtend: {
                    chat_id: chatId
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'start'
            })
            console.log('[埋点] 点击立即体验')
        }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

</script>
